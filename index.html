<!DOCTYPE html>
<!-- DQAP CRM 2026.07.03.2 - Role-based deal visibility -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>DQAP Sales CRM</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect fill='%23006994' width='64' height='64' rx='12'/%3E%3Ctext x='32' y='43' font-size='36' text-anchor='middle'%3E%F0%9F%8E%AF%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --p: #006994;
      --pd: #004A68;
      --pl: #E4F1FA;
      --bg: #F4F6FA;
      --card: #fff;
      --t1: #111;
      --t2: #666;
      --bd: rgba(0,0,0,.11);
      --bds: rgba(0,0,0,.22);
      --rad: 10px;
      --success: #3F704D;
      --warning: #E65100;
      --danger: #C62828;
    }
    
    body {
      font-family: 'DM Sans', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--t1);
      font-size: 13px;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }
    
    .header {
      background: linear-gradient(135deg, var(--p), var(--pd));
      color: #fff;
      padding: 30px 20px;
      border-radius: var(--rad);
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .header h1 {
      font-size: 28px;
      margin-bottom: 5px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .header p {
      opacity: 0.9;
      font-size: 14px;
    }
    
    .header-right {
      text-align: right;
      font-size: 13px;
    }
    
    .user-info {
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .user-quota {
      opacity: 0.85;
      font-size: 12px;
    }
    
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--bd);
    }
    
    .tab-btn {
      padding: 12px 16px;
      border: none;
      background: transparent;
      color: var(--t2);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
      border-bottom: 3px solid transparent;
    }
    
    .tab-btn:hover {
      color: var(--p);
    }
    
    .tab-btn.active {
      color: var(--p);
      border-bottom-color: var(--p);
    }
    
    .tab-content {
      display: none;
    }
    
    .tab-content.active {
      display: block;
    }
    
    .card {
      background: var(--card);
      border-radius: var(--rad);
      border: 0.5px solid var(--bd);
      padding: 20px;
      margin-bottom: 20px;
    }
    
    .card-header {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }
    
    .stat {
      background: var(--card);
      border-radius: var(--rad);
      border: 0.5px solid var(--bd);
      padding: 15px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    
    .stat-icon {
      width: 40px;
      height: 40px;
      background: var(--pl);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--p);
      font-size: 20px;
      flex-shrink: 0;
    }
    
    .stat-content {
      flex: 1;
    }
    
    .stat-value {
      font-size: 20px;
      font-weight: 600;
      color: var(--t1);
      line-height: 1;
    }
    
    .stat-label {
      font-size: 11px;
      color: var(--t2);
      margin-top: 4px;
      text-transform: uppercase;
      font-weight: 500;
    }

    .visibility-badge {
      font-size: 10px;
      background: rgba(230, 81, 0, 0.1);
      color: #E65100;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: auto;
      white-space: nowrap;
    }
  </style>

</head>
<body>

<div class="container">
  <div class="header">
    <div>
      <h1><i class="ti ti-briefcase"></i> DQAP Sales CRM</h1>
      <p>Pipeline, Activity & KAM Management</p>
    </div>
    <div class="header-right">
      <div class="user-info" id="userName">Loading...</div>
      <div class="user-quota" id="userQuota">—</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('dashboard')"><i class="ti ti-dashboard"></i> Dashboard</button>
    <button class="tab-btn" onclick="switchTab('leads')"><i class="ti ti-building"></i> Customers</button>
    <button class="tab-btn" onclick="switchTab('deals')"><i class="ti ti-coin"></i> Deals</button>
    <button class="tab-btn" onclick="switchTab('activities')"><i class="ti ti-clipboard-list"></i> Activity</button>
    <button class="tab-btn" onclick="switchTab('calendar')"><i class="ti ti-calendar"></i> Calendar</button>
    <button class="tab-btn" onclick="switchTab('targets')"><i class="ti ti-target"></i> Targets</button>
    <button class="tab-btn" onclick="switchTab('kam')"><i class="ti ti-building-community"></i> KAM</button>
    <button class="tab-btn" onclick="switchTab('tenders')"><i class="ti ti-file-description"></i> Tenders</button>
    <button class="tab-btn" onclick="switchTab('referrals')"><i class="ti ti-affiliate"></i> Referrals</button>
  </div>

  <!-- DASHBOARD TAB -->
  <div id="tab-dashboard" class="tab-content active">
    <div id="alertsContainer"></div>
    
    <div class="stats" id="dashboardStats"></div>
    
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px;">
      <div class="card">
        <div class="card-header">
          <span>Sales Synopsis</span>
          <span class="visibility-badge" id="synopsisBadge">Your Data</span>
        </div>
        <div id="synopsisContainer"></div>
      </div>
      
      <div class="card">
        <div class="card-header">Pipeline by Stage</div>
        <canvas id="pipelineChart" height="80"></canvas>
      </div>
    </div>
    
    <div class="card">
      <div class="card-header">Recent Activities</div>
      <div id="recentActivitiesContainer"></div>
    </div>
  </div>

  <!-- DEALS TAB -->
  <div id="tab-deals" class="tab-content">
    <div class="card">
      <div class="card-header">
        <span>All Deals <span id="dealCountBadge"></span></span>
        <span class="visibility-badge" id="dealsBadge">Your Deals</span>
      </div>
      <div id="dealsContainer"></div>
    </div>
  </div>

</div>

<script>
  // ═══════════════════════════════════════════════════════════════════════════
  // ROLE-BASED ACCESS CONTROL
  // ═══════════════════════════════════════════════════════════════════════════
  let currentUser = 'guest';
  let currentUserRole = 'user';
  
  // Admin users with full access to all deals
  const ADMIN_USERS = ['Updesh Verma', 'Pratim Sinha'];
  
  function isAdminUser() {
    return ADMIN_USERS.includes(currentUser);
  }
  
  function getVisibleDeals() {
    if (isAdminUser()) {
      // Admins see all deals
      return dealData;
    } else {
      // Regular users see only their own deals
      const filteredDeals = {};
      Object.entries(dealData).forEach(([key, deal]) => {
        if (deal.ownerName === currentUser) {
          filteredDeals[key] = deal;
        }
      });
      return filteredDeals;
    }
  }
  
  function getVisibilityBadge() {
    if (isAdminUser()) {
      return 'All Deals';
    } else {
      return 'Your Deals';
    }
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // DATA STORAGE & INITIALIZATION
  // ═══════════════════════════════════════════════════════════════════════════
  let dealData = {};
  let customerData = {};
  let activityData = {};
  let tenderData = {};
  let salesTotalData = {};
  let userQuotaData = {};

  function initializeAuth() {
    // This is a placeholder - integrate with your Firebase auth
    const storedUser = localStorage.getItem('crmUser') || 'Chetan Chawla';
    currentUser = storedUser;
    document.getElementById('userName').textContent = currentUser;
    document.getElementById('userQuota').textContent = `${currentUser}`;
    
    loadFirestoreData();
  }

  function loadFirestoreData() {
    // Integration with Firebase would go here
    // For now, this simulates loading data
    renderDashboard();
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // RENDER FUNCTIONS WITH VISIBILITY FILTERING
  // ═══════════════════════════════════════════════════════════════════════════
  
  function renderDashboard() {
    const visibleDeals = getVisibleDeals();
    
    // Update visibility badges
    document.getElementById('synopsisBadge').textContent = getVisibilityBadge();
    document.getElementById('dealsBadge').textContent = getVisibilityBadge();
    
    // Customers: show all (users can view customers)
    document.getElementById('statCustomers').textContent = Object.keys(customerData).length;
    
    // Active deals: only visible deals
    const activeDeals = Object.values(visibleDeals)
      .filter(d => d.stage !== 'Billed' && d.stage !== 'Lost').length;
    document.getElementById('statDeals').textContent = activeDeals;
    
    // Pipeline value: only visible deals
    const pipelineValue = Object.values(visibleDeals)
      .filter(d => d.stage !== 'Billed' && d.stage !== 'Lost')
      .reduce((sum, d) => sum + (d.value * d.probability / 100), 0);
    document.getElementById('statPipeline').textContent = '₹' + formatCurrency(pipelineValue);
    
    // Meeting quota (personal, always current user only)
    const quotaStatus = getMeetingQuotaStatus();
    document.getElementById('statMeetingsWeek').textContent = `${quotaStatus.new + quotaStatus.existing}/4`;
    
    // Recent activities (personal, always current user only)
    const thirtyDaysAgo = new Date();
    thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
    const recentActivities = Object.values(activityData)
      .filter(a => {
        const activityDate = toDateObject(a.activityDate);
        return activityDate && activityDate >= thirtyDaysAgo && a.username === currentUser;
      }).length;
    document.getElementById('statActivitiesMonth').textContent = recentActivities;
    
    // Won value: only visible deals that are billed
    const wonValue = Object.values(visibleDeals)
      .filter(d => d.stage === 'Billed')
      .reduce((sum, d) => sum + Number(d.value || 0), 0);
    document.getElementById('statWonValue').textContent = '₹' + formatCurrency(wonValue);
    
    renderSalesSynopsis();
    renderPipelineChart();
    renderRecentActivities();
    
    const alertsContainer = document.getElementById('alertsContainer');
    let alerts = '';
    
    // Meeting quota alert
    if (!quotaStatus.quotaMet) {
      alerts += `
        <div class="alert warning">
          <i class="ti ti-alert-triangle"></i> <strong>Meeting Quota:</strong> This week: ${quotaStatus.new}/2 new customers, ${quotaStatus.existing}/2 existing. Need ${quotaStatus.totalRemaining} more!
        </div>
      `;
    } else {
      alerts += `
        <div class="alert success">
          <i class="ti ti-check"></i> <strong>Meeting Quota Met!</strong> Completed: 2 new customers, 2 existing customers this week.
        </div>
      `;
    }
    
    alertsContainer.innerHTML = alerts || '';
  }
  
  function renderSalesSynopsis() {
    const visibleDeals = getVisibleDeals();
    
    const synopsisData = {};
    Object.values(visibleDeals).forEach(deal => {
      if (!synopsisData[deal.stage]) {
        synopsisData[deal.stage] = { count: 0, value: 0 };
      }
      synopsisData[deal.stage].count++;
      synopsisData[deal.stage].value += Number(deal.value || 0);
    });
    
    const stages = ['Lead', 'Prospect', 'Qualification', 'Proposal', 'Negotiation', 'Billed', 'Lost'];
    let html = '<table style="width:100%; border-collapse: collapse;">';
    html += '<tr><th style="text-align:left; padding:8px;">Stage</th><th style="text-align:right; padding:8px;">Count</th><th style="text-align:right; padding:8px;">Value (₹)</th></tr>';
    
    stages.forEach(stage => {
      const data = synopsisData[stage] || { count: 0, value: 0 };
      html += `<tr style="border-top:1px solid var(--bd);">
        <td style="padding:8px;">${stage}</td>
        <td style="text-align:right; padding:8px;">${data.count}</td>
        <td style="text-align:right; padding:8px;">₹${formatCurrency(data.value)}</td>
      </tr>`;
    });
    html += '</table>';
    
    document.getElementById('synopsisContainer').innerHTML = html;
  }
  
  function renderPipelineChart() {
    const visibleDeals = getVisibleDeals();
    
    const stages = ['Lead', 'Prospect', 'Qualification', 'Proposal', 'Negotiation', 'Billed', 'Lost'];
    const values = stages.map(stage => {
      return Object.values(visibleDeals)
        .filter(d => d.stage === stage)
        .reduce((sum, d) => sum + Number(d.value || 0), 0);
    });
    
    const ctx = document.getElementById('pipelineChart').getContext('2d');
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: stages,
        datasets: [{
          label: 'Value (₹L)',
          data: values.map(v => v / 100000),
          backgroundColor: '#006994',
          borderRadius: 6,
          borderSkipped: false
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        indexAxis: 'x',
        plugins: {
          legend: { display: false }
        },
        scales: {
          y: { beginAtZero: true }
        }
      }
    });
  }
  
  function renderRecentActivities() {
    const thirtyDaysAgo = new Date();
    thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
    
    const recentActivities = Object.values(activityData)
      .filter(a => {
        const activityDate = toDateObject(a.activityDate);
        return activityDate && activityDate >= thirtyDaysAgo && a.username === currentUser;
      })
      .sort((a, b) => {
        const aDate = toDateObject(a.activityDate).getTime();
        const bDate = toDateObject(b.activityDate).getTime();
        return bDate - aDate;
      })
      .slice(0, 5);
    
    let html = '<div style="display:flex; flex-direction:column; gap:12px;">';
    if (recentActivities.length === 0) {
      html += '<p style="color:var(--t2);">No recent activities</p>';
    } else {
      recentActivities.forEach(activity => {
        html += `
          <div style="padding:10px; border-left:3px solid var(--p); background:var(--pl); border-radius:4px;">
            <div style="font-weight:600; font-size:12px;">${activity.activityType} - ${customerData[getActivityAccountId(activity)]?.name || 'Unknown'}</div>
            <div style="font-size:11px; color:var(--t2); margin-top:4px;">${formatDate(activity.activityDate)}</div>
          </div>
        `;
      });
    }
    html += '</div>';
    document.getElementById('recentActivitiesContainer').innerHTML = html;
  }
  
  function renderDeals() {
    const visibleDeals = getVisibleDeals();
    document.getElementById('dealCountBadge').textContent = `(${Object.keys(visibleDeals).length})`;
    
    let html = '<div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap:15px;">';
    
    Object.entries(visibleDeals).forEach(([key, deal]) => {
      const probability = deal.probability || 0;
      const stage = deal.stage || 'Lead';
      const value = Number(deal.value || 0);
      const expectedValue = (value * probability / 100);
      
      html += `
        <div style="border:1px solid var(--bd); border-radius:var(--rad); padding:15px; background:var(--card);">
          <div style="font-weight:600; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center;">
            <span>${escapeHtml(deal.dealName || 'Untitled Deal')}</span>
            <span style="font-size:10px; background:var(--pl); color:var(--p); padding:4px 8px; border-radius:4px;">${stage}</span>
          </div>
          <div style="font-size:12px; color:var(--t2); margin-bottom:8px;">
            ${escapeHtml(customerData[deal.accountId]?.name || 'Unknown Customer')}
          </div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px;">
            <div>
              <div style="font-size:10px; color:var(--t2); text-transform:uppercase; font-weight:600; margin-bottom:2px;">Deal Value</div>
              <div style="font-weight:600;">₹${formatCurrency(value)}</div>
            </div>
            <div>
              <div style="font-size:10px; color:var(--t2); text-transform:uppercase; font-weight:600; margin-bottom:2px;">Expected Value</div>
              <div style="font-weight:600;">₹${formatCurrency(expectedValue)}</div>
            </div>
          </div>
          <div style="font-size:11px; color:var(--t2);">Owner: <strong>${escapeHtml(deal.ownerName || 'Unassigned')}</strong></div>
        </div>
      `;
    });
    html += '</div>';
    
    document.getElementById('dealsContainer').innerHTML = html;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // UTILITIES
  // ═══════════════════════════════════════════════════════════════════════════
  
  function switchTab(tabName) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tabName).classList.add('active');
    document.querySelector(`[onclick*="'${tabName}'"]`).classList.add('active');
    
    if (tabName === 'dashboard') renderDashboard();
    if (tabName === 'deals') renderDeals();
  }
  
  function formatCurrency(val) {
    return (val / 100000).toFixed(2) + 'L';
  }
  
  function formatDate(dateStr) {
    const d = toDateObject(dateStr);
    if (!d) return '—';
    return `${String(d.getDate()).padStart(2, '0')}-${String(d.getMonth() + 1).padStart(2, '0')}-${d.getFullYear()}`;
  }
  
  function toDateObject(dateStr) {
    if (!dateStr) return null;
    if (typeof dateStr === 'object' && dateStr.toDate) return dateStr.toDate();
    const parsed = new Date(dateStr);
    return isNaN(parsed.getTime()) ? null : parsed;
  }
  
  function getActivityAccountId(activity) {
    return activity.customerId || activity.accountId || '';
  }
  
  function escapeHtml(value) {
    return String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }
  
  function getMeetingQuotaStatus() {
    return {
      new: 0,
      existing: 0,
      newRemaining: 2,
      existingRemaining: 2,
      totalRemaining: 4,
      quotaMet: false
    };
  }
  
  // ═══════════════════════════════════════════════════════════════════════════
  // INITIALIZATION
  // ═══════════════════════════════════════════════════════════════════════════
  window.addEventListener('DOMContentLoaded', initializeAuth);
  window.addEventListener('load', initializeAuth);
</script>

</body>
</html>
